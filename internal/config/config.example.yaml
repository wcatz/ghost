# Ghost — MCP Memory Server Configuration
# ~/.config/ghost/config.yaml
#
# Loading order (later overrides earlier):
#   1. Compiled defaults
#   2. /etc/ghost/config.yaml
#   3. ~/.config/ghost/config.yaml  (this file)
#   4. GHOST_* environment variables (plus ANTHROPIC_API_KEY)

# --- Claude API ---
# Required only for memory consolidation (ghost reflect --tier haiku).
# Not needed for basic MCP usage.
# api:
#   key: ""                          # or set ANTHROPIC_API_KEY env var

# --- Local Embeddings (Ollama) ---
# Enables hybrid FTS5 + vector search. Requires Ollama running locally.
# Without this, Ghost uses FTS5 full-text search only (still very good).
# embedding:
#   enabled: true
#   ollama_url: "http://localhost:11434"
#   model: "nomic-embed-text:v1.5"   # 274MB, runs fine on CPU
#   dimensions: 768

# --- Memory Linking (requires embedding) ---
# Background worker that links similar memories into a graph. The graph feeds
# the Obsidian mirror's graph view and supersede candidate selection. A
# search-time graph-expansion ranking bonus was evaluated and removed
# (dominated by a deeper vector-k; see docs/benchmarks.md); the link graph is
# retained for the uses above. The worker itself is on by default.
# linking:
#   enabled: true
#   threshold: 0.70   # min cosine similarity to create a link

# --- Memory Consolidation ---
# Controls the default tier for ghost reflect.
# auto: tries haiku (if ANTHROPIC_API_KEY set) → sqlite (free, always available)
# reflection:
#   backend: "auto"                  # "auto", "haiku", "sqlite"

# --- Obsidian Vault Mirror ---
# One-way Markdown mirror of memories, decisions, and tasks
# (ghost obsidian export|sync). Empty vault_dir means ~/Documents/GhostVault.
# auto_sync (default false) makes the session-start hook spawn `ghost
# obsidian sync` in the background automatically. Leave it off if you don't
# use Obsidian — it's opt-in so nobody gets a vault directory or a background
# process they didn't ask for.
# obsidian:
#   vault_dir: ""                    # or set GHOST_OBSIDIAN_VAULT_DIR
#   interval: "30s"                  # sync poll cadence (Go duration, e.g. "1m")
#   auto_sync: false                 # true = auto-start sync from session-start
