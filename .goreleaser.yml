version: 2

builds:
  - id: ghost
    main: ./cmd/ghost
    binary: ghost
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

homebrew_casks:
  - repository:
      owner: wcatz
      name: homebrew-tap
    homepage: "https://github.com/wcatz/ghost"
    description: "Memory-first personal assistant powered by Claude"
    license: "MIT"
    binaries:
      - ghost
