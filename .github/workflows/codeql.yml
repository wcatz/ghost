name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: github/codeql-action/init@v3
        with:
          languages: go
          build-mode: manual

      - name: Build
        run: go build -tags "fts5" ./cmd/ghost

      - uses: github/codeql-action/analyze@v3
