name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v9
        with:
          # Pinned to the version verified locally against .golangci.yml —
          # 'latest' can break CI without a code change on a major bump.
          version: v2.12.2
          args: --new-from-rev=origin/main

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/ghost
