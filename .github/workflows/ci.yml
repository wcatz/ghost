name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --new-from-rev=origin/main

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/ghost

  extension:
    runs-on: ubuntu-latest
    steps:
      - name: VSCode extension removed in v0.8.0
        run: echo "Ghost is now MCP-only. VSCode extension has been removed."
