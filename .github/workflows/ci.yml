name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet -tags "fts5" ./...

      - name: Test
        run: go test -tags "fts5" -race -count=1 ./...

      - name: Build
        run: go build -tags "fts5" -o /dev/null ./cmd/ghost
