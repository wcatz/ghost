name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1
          args: --new-from-rev=origin/main

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -o /dev/null ./cmd/ghost

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-ghost
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vscode-ghost/package-lock.json

      - run: npm ci

      - name: Typecheck (extension)
        run: npx tsc --noEmit

      - name: Typecheck (webview)
        run: npx tsc --noEmit -p tsconfig.webview.json

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run compile

      - name: Package
        run: npx @vscode/vsce package --no-dependencies
